<div class="dashboard-container">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h3>Xolo Admin</h3>
        </div>
        <nav class="nav-links">
            <a href="javascript:void(0)" class="active">Dashboard</a>
            <a href="javascript:void(0)" (click)="navigateTo('/admin/drivers')">Driver Management</a>
            <a href="javascript:void(0)" (click)="navigateTo('/admin/rides')">Ride Management</a>
            <a href="javascript:void(0)" (click)="logout()" class="text-danger mt-4">Logout</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <h1 class="page-title">Welcome, {{ user?.name }}!</h1>

        <div class="modern-card">
            <h3 class="mb-4">Admin Dashboard Overview</h3>
            <div class="row">
                <div class="col-md-6 mb-4">
                    <div class="card bg-primary text-white p-4 shadow-sm h-100"
                        style="border-radius:15px; border:none; cursor:pointer;" (click)="navigateTo('/admin/drivers')">
                        <h4>Drivers</h4>
                        <p class="mb-0 fs-5">Manage available and busy drivers</p>
                    </div>
                </div>
                <div class="col-md-6 mb-4">
                    <div class="card bg-success text-white p-4 shadow-sm h-100"
                        style="border-radius:15px; border:none; cursor:pointer;" (click)="navigateTo('/admin/rides')">
                        <h4>Rides</h4>
                        <p class="mb-0 fs-5">View and update ride status</p>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
