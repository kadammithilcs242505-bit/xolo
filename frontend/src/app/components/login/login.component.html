<div class="auth-container">
  <div class="auth-wrapper">
    <div class="auth-illustration">
      <div class="illustration-content">
        <h1 class="bounce-title">Xolo<span class="text-secondary">Rider</span></h1>
        <p class="float-text">Book a ride to the future. Secure, Fast, and Elegant.</p>
        <div class="floating-shapes">
          <div class="shape shape-1"></div>
          <div class="shape shape-2"></div>
        </div>
      </div>
    </div>
    <div class="auth-form-side">
      <div class="card auth-card shadow-lg">
        <div class="card-body p-5">
          <h2 class="text-center mb-4 login-title">Welcome Back</h2>
          <div *ngIf="errorMsg" class="alert alert-danger">{{ errorMsg }}</div>

          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <div class="form-group mb-3">
              <label class="form-label form-title">Email Address</label>
              <input type="email" class="form-control form-control-lg custom-input" formControlName="email"
                placeholder="Enter your email">
            </div>

            <div class="form-group mb-4">
              <label class="form-label form-title">Password</label>
              <input type="password" class="form-control form-control-lg custom-input" formControlName="password"
                placeholder="Enter your password">
            </div>

            <button type="submit" class="btn btn-primary w-100 btn-lg mb-3 submit-btn" [disabled]="loginForm.invalid">
              Login
            </button>

            <p class="text-center text-muted">
              Don't have an account? <a routerLink="/register"
                class="text-primary fw-bold text-decoration-none">Register</a>
            </p>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
