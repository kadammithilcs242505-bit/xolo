<div class="auth-container">
    <div class="auth-wrapper">
        <div class="auth-illustration">
            <div class="illustration-content">
                <h1 class="bounce-title">Join Xolo<span class="text-secondary">Rider</span></h1>
                <p class="float-text">Create an account and start your journey today. Your comfortable ride is just a
                    few clicks away.</p>
                <div class="floating-shapes">
                    <div class="shape shape-1"></div>
                    <div class="shape shape-2"></div>
                </div>
            </div>
        </div>
        <div class="auth-form-side">
            <div class="card auth-card shadow-lg">
                <div class="card-body p-5">
                    <h2 class="text-center mb-4 login-title">Create an Account</h2>
                    <div *ngIf="errorMsg" class="alert alert-danger">{{ errorMsg }}</div>

                    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
                        <div class="form-group mb-3">
                            <label class="form-label form-title">Full Name</label>
                            <input type="text" class="form-control form-control-lg custom-input" formControlName="name"
                                placeholder="John Doe">
                        </div>

                        <div class="form-group mb-3">
                            <label class="form-label form-title">Email Address</label>
                            <input type="email" class="form-control form-control-lg custom-input"
                                formControlName="email" placeholder="john@example.com">
                        </div>

                        <div class="form-group mb-3">
                            <label class="form-label form-title">Phone Number</label>
                            <input type="text" class="form-control form-control-lg custom-input" formControlName="phone"
                                placeholder="e.g. 1234567890">
                        </div>

                        <div class="form-group mb-4">
                            <label class="form-label form-title">Password</label>
                            <input type="password" class="form-control form-control-lg custom-input"
                                formControlName="password" placeholder="Min 6 characters">
                        </div>

                        <button type="submit" class="btn btn-primary w-100 btn-lg mb-3 submit-btn"
                            [disabled]="registerForm.invalid">
                            Register
                        </button>

                        <p class="text-center text-muted">
                            Already have an account? <a routerLink="/login"
                                class="text-primary fw-bold text-decoration-none">Login</a>
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
