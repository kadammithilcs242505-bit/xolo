<div class="dashboard-container">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h3>Xolo Rider</h3>
        </div>
        <nav class="nav-links">
            <a href="javascript:void(0)" class="active">Dashboard</a>
            <a href="javascript:void(0)" (click)="navigateTo('/customer/book-ride')">Book a Ride</a>
            <a href="javascript:void(0)" (click)="navigateTo('/customer/ride-history')">Ride History</a>
            <a href="javascript:void(0)" (click)="logout()" class="text-danger mt-4">Logout</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <h1 class="page-title">Welcome, {{ user?.name }}!</h1>

        <div class="modern-card">
            <h3 class="mb-4">Quick Actions</h3>
            <div class="row">
                <div class="col-md-6 mb-4">
                    <div class="card bg-primary text-white p-4 shadow-sm h-100"
                        style="border-radius:15px; border:none; cursor:pointer;"
                        (click)="navigateTo('/customer/book-ride')">
                        <h4>Book a Ride</h4>
                        <p class="mb-0 fs-5">Get a cab in minutes</p>
                    </div>
                </div>
                <div class="col-md-6 mb-4">
                    <div class="card p-4 h-100"
                        style="background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius:15px; cursor:pointer;"
                        (click)="navigateTo('/customer/ride-history')">
                        <div class="card-body">
                            <h4 class="text-dark">Ride History</h4>
                            <p class="text-muted fs-5 mb-0">View past and current rides</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
